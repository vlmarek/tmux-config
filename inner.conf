# Inner tmux configuration
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:Tc"
set -g history-limit 100000
setw -g automatic-rename off

# Show inner status bar
set -g status on
set -g status-position bottom
set -g status-left ""
set -g status-right ""

# Inner prefix: Ctrl-a
unbind C-b
set -g prefix C-a
bind C-a last-window
bind a   last-window

# Inner window controls (Ctrl-a ...)
bind c new-window -n .
bind C-c new-window -n .
bind n next-window
bind Space next-window
bind p previous-window
bind "'" choose-window
bind A command-prompt -I "#W" "rename-window -- '%%'"
bind N command-prompt -p "number" "run-shell '~/.tmux2/number.sh %%'"
bind "|" split-window -h
bind "-" split-window -v
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind K confirm-before -p "Really kill this window [y/n]" kill-window
bind l select-pane -R

# Ctrl-x controls outer tmux from inside inner tmux
bind -n C-x switch-client -T outer-prefix
bind -T outer-prefix c run-shell "~/.tmux2/outer-action.sh new"
bind -T outer-prefix C-c run-shell "~/.tmux2/outer-action.sh new"
bind -T outer-prefix n run-shell "~/.tmux2/outer-action.sh next"
bind -T outer-prefix p run-shell "~/.tmux2/outer-action.sh prev"
bind -T outer-prefix a command-prompt -p "outer name" "run-shell '~/.tmux2/outer-rename.sh %%'"
bind -T outer-prefix A command-prompt -p "outer name" "run-shell '~/.tmux2/outer-rename.sh %%'"
bind -T outer-prefix N command-prompt -p "number" "run-shell '~/.tmux2/outer-number.sh %%'"
# Unknown second key after Ctrl-x: return to normal
bind -T outer-prefix Any switch-client -T root

# Persist outer socket from server environment
run-shell 'p=$(tmux show-environment -g TMUX_PARENT 2>/dev/null | sed -n "s/^TMUX_PARENT=//p"); [ -n "$p" ] && tmux set -g @tmux_parent "$p"'

# Status line colors
set -g status-style bg=default,fg=default
setw -g window-status-style bg=default,fg=default
setw -g window-status-current-style bg=blue,fg=white
setw -g window-status-format " #I #{=8:window_name} "
setw -g window-status-current-format " #I #{window_name} "

set -g pane-border-lines simple
