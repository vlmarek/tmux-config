# Outer tmux configuration
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:Tc"
set -g history-limit 100000
setw -g automatic-rename off

# Show outer status bar
set -g status on
set -g status-position bottom
set -g status-left ""
set -g status-right "%Y-%m-%d %H:%M"

# Outer prefix: Ctrl-x
unbind C-b
set -g prefix C-x
bind C-x last-window
bind x   last-window

# Outer window controls (Ctrl-x ...)
bind c new-window -n bash
bind C-c new-window -n bash
bind K confirm-before -p "Really kill this window [y/n]" kill-window
bind n next-window
bind Space next-window
bind "'" choose-window
bind a command-prompt -I "#W" "rename-window -- '%%'"
bind A command-prompt -I "#W" "rename-window -- '%%'"
bind N command-prompt -p "number" "run-shell '~/.tmux2/number.sh %%'"

# Every new outer window/session should start inner tmux in its pane
set-hook -g after-new-session "run-shell ~/.tmux2/open-inner.sh"
set-hook -g after-new-window  "run-shell ~/.tmux2/open-inner.sh"

# Also ensure initial pane gets inner tmux when config loads
run-shell "~/.tmux2/open-inner.sh"

# Status line colors
set -g status-style bg=default,fg=default
setw -g window-status-style bg=default,fg=default
setw -g window-status-current-style bg=blue,fg=white
setw -g window-status-format " #I #{=8:window_name} "
setw -g window-status-current-format " #I #{window_name} "

set -g pane-border-lines simple
